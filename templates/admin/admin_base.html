<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Placement Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>

<div class="admin-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span class="logo-icon">🎓</span>
            <span class="logo-text">Placement Portal</span>
        </div>

        <ul class="sidebar-menu">
            <li class="{% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
                <a href="{{ url_for('admin_dashboard') }}">
                    <i class="bi bi-grid"></i> Dashboard
                </a>
            </li>

            <li class="{% if request.endpoint == 'manage_companies' %}active{% endif %}">
                <a href="{{ url_for('manage_companies') }}">
                    <i class="bi bi-building"></i> Companies
                </a>
            </li>

            <li class="{% if request.endpoint == 'manage_students' %}active{% endif %}">
                <a href="{{ url_for('manage_students') }}">
                    <i class="bi bi-people"></i> Students
                </a>
            </li>

            <li class="{% if request.endpoint == 'manage_drives' %}active{% endif %}">
                <a href="{{ url_for('manage_drives') }}">
                    <i class="bi bi-briefcase"></i> Placement Drives
                </a>
            </li>
        </ul>

        <!-- LOGOUT -->
        <div class="sidebar-footer">
            <form action="{{ url_for('logout') }}" method="POST" style="display:inline;">
                <button type="submit" class="btn btn-danger">
                    Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <!-- TOP BAR -->
        <header class="topbar">
            <div></div>
            <div class="admin-user">
                <i class="bi bi-person-circle"></i>
                Admin User
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <section class="content-area">
            {% block admin_content %}{% endblock %}
        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
