{% extends 'company/company_base.html' %}
{% block content %}

<h2 class="fw-bold">Create Placement Drive</h2>
<p class="text-muted">Post a new job opening</p>

<div class="card shadow-sm p-4 col-md-6">
<form method="POST">

    <div class="mb-3">
        <label class="fw-semibold">Job Title</label>
        <input type="text" name="job_title" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="fw-semibold">Job Description</label>
        <textarea name="description" class="form-control" rows="3" required></textarea>
    </div>

    <div class="mb-3">
        <label class="fw-semibold">Eligibility</label>
        <input type="text" name="eligibility" class="form-control">
    </div>

    <div class="mb-3">
        <label class="fw-semibold">Deadline</label>
        <input type="date" name="deadline" class="form-control" required>
    </div>

    <button class="btn btn-primary w-100">
        <i class="bi bi-check-circle"></i> Create Drive
    </button>

</form>
</div>

{% endblock %}
