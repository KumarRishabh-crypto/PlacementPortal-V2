<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company | Placement Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body>

<div class="admin-wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span class="logo-icon">🎓</span>
            <span class="logo-text">Placement Portal</span>
            <small class="text-muted">Company Portal</small>
        </div>

        <ul class="sidebar-menu">
            <li class="{% if request.endpoint == 'company_dashboard' %}active{% endif %}">
                <a href="{{ url_for('company_dashboard') }}">
                    <i class="bi bi-grid"></i> Dashboard
                </a>
            </li>

            <li class="{% if request.endpoint == 'company_drives' %}active{% endif %}">
                <a href="{{ url_for('company_drives') }}">
                    <i class="bi bi-briefcase"></i> Placement Drives
                </a>
            </li>

            <li class="{% if request.endpoint == 'company_applications' %}active{% endif %}">
                <a href="{{ url_for('company_applications') }}">
                    <i class="bi bi-file-earmark-text"></i> Applications
                </a>
            </li>
        </ul>

        <!-- LOGOUT -->
        <div class="sidebar-footer">
            <form action="{{ url_for('logout') }}" method="POST">
                <button type="submit" class="btn btn-danger">Logout</button>
            </form>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <!-- TOP BAR -->
        <header class="topbar">
            <div class="portal-title">
                <i class="bi bi-mortarboard-fill"></i> Placement Portal
            </div>

            <div class="admin-user">
                <i class="bi bi-person-circle"></i>
                {{ current_user.company.company_name }}
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <section class="content-area">
            {% block content %}{% endblock %}
        </section>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
