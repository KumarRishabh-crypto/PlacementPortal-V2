<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Placement Portal | Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/student.css') }}">
</head>

<body>

<div class="student-wrapper">

    <!-- SIDEBAR -->
    <aside class="student-sidebar">
        <div class="logo">
            <i class="bi bi-mortarboard-fill"></i>
            <span>Placement Portal</span>
        </div>

        <ul class="menu">
            <li class="{% if request.endpoint == 'student_dashboard' %}active{% endif %}">
                <a href="{{ url_for('student_dashboard') }}">
                    <i class="bi bi-grid"></i> Dashboard
                </a>
            </li>
            <li class="{% if request.endpoint == 'student_drives' %}active{% endif %}">
                <a href="{{ url_for('student_drives') }}">
                    <i class="bi bi-briefcase"></i> Available Drives
                </a>
            </li>
            <li class="{% if request.endpoint == 'student_applications' %}active{% endif %}">
                <a href="{{ url_for('student_applications') }}">
                    <i class="bi bi-file-earmark-text"></i> My Applications
                </a>
            </li>
            <li class="{% if request.endpoint == 'student_profile' %}active{% endif %}">
                <a href="{{ url_for('student_profile') }}">
                    <i class="bi bi-person"></i> Profile
                </a>
            </li>
        </ul>

        <div class="logout">
            <form action="{{ url_for('logout') }}" method="POST">
            <button type="submit" class="btn btn-danger">Logout</button>
        </form>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="student-main">

        <!-- TOP BAR -->
        <header class="topbar">
            <div></div>
            <div class="user-pill">
                <i class="bi bi-person-circle"></i>
                {{ current_user.name }}
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <section class="content">
            {% block content %}{% endblock %}
        </section>

    </main>

</div>

</body>
</html>
